apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis-commander

spec:
  replicas: 1

  selector:
    matchLabels:
      app: redis-commander

  template:
    metadata:
      labels:
        app: redis-commander

    spec:
      containers:
        - name: redis-commander

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8081

          env:
            - name: REDIS_HOSTS
              value: |-
                {{- range $i, $conn := .Values.redisConnections }}
                {{- if $i }},{{ end }}{{ $conn.host }}:{{ $conn.port }}:{{ $conn.name }}:{{ $conn.password }}
                {{- end }}
