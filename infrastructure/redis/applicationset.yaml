apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet

metadata:
  name: redis
  namespace: argocd

spec:
  goTemplate: true

  generators:
    - git:
        repoURL: https://github.com/NurZaRio/company.git
        revision: main

        files:
          - path: projects/*/redis/*.yaml

  template:
    metadata:
      name: '{{ index .path.segments 1 }}-redis-{{ trimSuffix ".yaml" .path.basename }}'

    spec:
      project: default

      source:
        repoURL: https://github.com/NurZaRio/company.git
        targetRevision: main

        path: infrastructure/redis

        helm:
          valueFiles:
            - '{{ .path.path }}'

      destination:
        server: https://kubernetes.default.svc

        namespace: '{{ index .path.segments 1 }}-redis-{{ trimSuffix ".yaml" .path.basename }}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true

        syncOptions:
          - CreateNamespace=true