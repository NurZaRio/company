image:
  repository: redis
  tag: "7.2"

service:
  port: 6379

sentinel:
  port: 26379
  quorum: 2
  downAfterMilliseconds: 5000
  failoverTimeout: 10000
  parallelSyncs: 1

auth:
  enabled: true
  password: changeme

resources:
  requests:
    cpu: 25m
    memory: 64Mi

  limits:
    cpu: 200m
    memory: 256Mi

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""

replicaCount: 3
