image:
  repository: redis
  tag: "7.2"

service:
  port: 6379

auth:
  enabled: true
  # password: auto-generated

replicaCount: 3

redis:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  customConfig:
    - min-replicas-to-write 2

sentinel:
  replicas: 3
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  customConfig: []

persistence:
  enabled: true
  size: 500Mi
  storageClass: ""
