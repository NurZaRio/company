apiVersion: v1
kind: Service

metadata:
  name: redis

spec:
  selector:
    app: redis

  ports:
    - name: redis
      port: {{ .Values.service.port }}
      targetPort: redis
---
apiVersion: v1
kind: Service

metadata:
  name: redis-headless

spec:
  clusterIP: None
  selector:
    app: redis

  ports:
    - name: redis
      port: {{ .Values.service.port }}
      targetPort: redis
---
apiVersion: v1
kind: Service

metadata:
  name: redis-sentinel

spec:
  type: NodePort
  selector:
    app: redis

  ports:
    - name: sentinel
      port: {{ .Values.sentinel.port }}
      targetPort: sentinel
      {{- if .Values.sentinel.nodePort }}
      nodePort: {{ .Values.sentinel.nodePort }}
      {{- end }}
