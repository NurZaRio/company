apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: redis

spec:
  serviceName: redis-headless

  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: redis
                topologyKey: kubernetes.io/hostname

      initContainers:
        - name: redis-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              POD_HOSTNAME=$(hostname)
              POD_NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
              MY_DNS="${POD_HOSTNAME}.redis-headless.${POD_NAMESPACE}.svc.cluster.local"

              cat > /etc/redis/redis.conf << EOF
              port 6379
              {{- if .Values.auth.enabled }}
              requirepass ${REDIS_PASSWORD}
              masterauth ${REDIS_PASSWORD}
              {{- end }}
              {{- if .Values.persistence.enabled }}
              save 900 1
              save 300 10
              save 60 10000
              appendonly yes
              {{- else }}
              save ""
              appendonly no
              {{- end }}
              EOF

              # Try to discover current master from any running sentinel
              MASTER_HOST=""
              for i in $(seq 0 $((REPLICA_COUNT - 1))); do
                SENTINEL_HOST="redis-${i}.redis-headless.${POD_NAMESPACE}.svc.cluster.local"
                FOUND=$(redis-cli -h "${SENTINEL_HOST}" -p ${SENTINEL_PORT} \
                  --no-auth-warning \
                  {{- if .Values.auth.enabled }}
                  -a "${REDIS_PASSWORD}" \
                  {{- end }}
                  SENTINEL get-master-addr-by-name mymaster 2>/dev/null | head -1)
                if [ -n "$FOUND" ]; then
                  MASTER_HOST="$FOUND"
                  break
                fi
              done

              if [ -n "$MASTER_HOST" ]; then
                # Sentinel knows who the master is
                if [ "$MASTER_HOST" != "$MY_DNS" ]; then
                  echo "replicaof ${MASTER_HOST} 6379" >> /etc/redis/redis.conf
                fi
              else
                # First start — no sentinel info yet, use ordinal fallback
                POD_ORDINAL=${POD_HOSTNAME##*-}
                if [ "$POD_ORDINAL" != "0" ]; then
                  echo "replicaof redis-0.redis-headless.${POD_NAMESPACE}.svc.cluster.local 6379" >> /etc/redis/redis.conf
                fi
              fi

              cat > /etc/redis/sentinel.conf << EOF
              port ${SENTINEL_PORT}
              sentinel resolve-hostnames yes
              sentinel announce-hostnames yes
              sentinel monitor mymaster redis-0.redis-headless.${POD_NAMESPACE}.svc.cluster.local 6379 ${SENTINEL_QUORUM}
              {{- if .Values.auth.enabled }}
              sentinel auth-pass mymaster ${REDIS_PASSWORD}
              {{- end }}
              sentinel down-after-milliseconds mymaster ${SENTINEL_DOWN_AFTER}
              sentinel failover-timeout mymaster ${SENTINEL_FAILOVER_TIMEOUT}
              sentinel parallel-syncs mymaster ${SENTINEL_PARALLEL_SYNCS}
              EOF
          env:
            {{- if .Values.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: password
            {{- end }}
            - name: SENTINEL_PORT
              value: {{ .Values.sentinel.port | quote }}
            - name: SENTINEL_QUORUM
              value: {{ .Values.sentinel.quorum | quote }}
            - name: SENTINEL_DOWN_AFTER
              value: {{ .Values.sentinel.downAfterMilliseconds | quote }}
            - name: SENTINEL_FAILOVER_TIMEOUT
              value: {{ .Values.sentinel.failoverTimeout | quote }}
            - name: SENTINEL_PARALLEL_SYNCS
              value: {{ .Values.sentinel.parallelSyncs | quote }}
            - name: REPLICA_COUNT
              value: {{ .Values.replicaCount | quote }}
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis

      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["redis-server", "/etc/redis/redis.conf"]

          {{- if .Values.auth.enabled }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: password
          {{- end }}

          ports:
            - name: redis
              containerPort: 6379

          resources:
{{ toYaml .Values.resources | indent 12 }}

          {{- if .Values.auth.enabled }}
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- end }}

          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
          {{- if .Values.persistence.enabled }}
            - name: redis-data
              mountPath: /data
          {{- end }}

        - name: sentinel
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["redis-sentinel", "/etc/redis/sentinel.conf"]

          ports:
            - name: sentinel
              containerPort: {{ .Values.sentinel.port }}

          resources:
{{ toYaml .Values.resources | indent 12 }}

          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis

      volumes:
        - name: redis-config
          emptyDir: {}

  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: redis-data

      spec:
        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: {{ .Values.persistence.size }}

    {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
    {{- end }}
  {{- end }}
