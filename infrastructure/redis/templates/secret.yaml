{{- if .Values.auth.enabled }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace "redis-auth" -}}
{{- $password := "" -}}
{{- if $existingSecret -}}
{{-   $password = index $existingSecret.data "password" | b64dec -}}
{{- else -}}
{{-   $password = randAlphaNum 16 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: redis-auth
type: Opaque
stringData:
  password: {{ $password }}
{{- end }}